name: DevSecOps Pipeline (Cloud)

on: [push, pull_request]

jobs:

  unit-test:
    name: Tests unitaires & couverture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - run: npm test
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  sonar-check:
    name: Analyse SonarQube Cloud
    needs: unit-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/
      - uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  dependency-scan:
    name: Scan dependances (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          format: 'table'

  build-image:
    name: Build image Docker
    needs: [sonar-check, dependency-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: docker build -t webapp:${{ github.sha }} .
      - name: Sauvegarde image
        run: docker save webapp:${{ github.sha }} -o webapp.tar
      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: webapp.tar

  container-scan:
    name: Scan image Docker (Trivy)
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docker-image
      - name: Chargement image
        run: docker load -i webapp.tar
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: 'webapp:${{ github.sha }}'
          severity: 'CRITICAL'
          exit-code: '1'
          format: 'table'
